<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f04e23"/>
      <stop offset="100%" stop-color="#e6392b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Git branch line (main) -->
  <line x1="200" y1="120" x2="200" y2="392" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Git branch line (feature branch curving out and back) -->
  <path d="M200 200 C200 200, 240 180, 300 200 C360 220, 360 280, 300 300 C240 320, 200 300, 200 300"
        stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>

  <!-- Commit nodes on main -->
  <circle cx="200" cy="152" r="24" fill="white"/>
  <circle cx="200" cy="256" r="24" fill="white"/>
  <circle cx="200" cy="360" r="24" fill="white"/>

  <!-- Feature branch node -->
  <circle cx="316" cy="250" r="24" fill="white"/>

  <!-- Pulse/tracker ring on latest commit -->
  <circle cx="200" cy="360" r="40" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>
  <circle cx="200" cy="360" r="56" fill="none" stroke="white" stroke-width="3" opacity="0.25"/>

  <!-- AI sparkle on feature node -->
  <g transform="translate(348, 218)">
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z" fill="white" opacity="0.9"/>
  </g>
  <g transform="translate(370, 244)" opacity="0.6">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="white"/>
  </g>
</svg>
