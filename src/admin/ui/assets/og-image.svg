<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gitRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f04e23"/>
      <stop offset="100%" stop-color="#e6392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="white" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="white" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="white" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="white" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="white" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="white" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="white" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="white" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="white" stroke-width="1"/>
  </g>

  <!-- Logo icon (left side) -->
  <g transform="translate(100, 140)">
    <rect width="160" height="160" rx="32" fill="url(#gitRed)"/>
    <line x1="62" y1="36" x2="62" y2="124" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <circle cx="62" cy="46" r="7" fill="white"/>
    <circle cx="62" cy="80" r="7" fill="white"/>
    <circle cx="62" cy="114" r="7" fill="white"/>
    <path d="M62 60 C62 60, 76 54, 100 62 C124 70, 118 88, 100 92 C82 96, 62 90, 62 90" stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.5"/>
    <circle cx="102" cy="77" r="6" fill="white"/>
    <g transform="translate(120, 38)">
      <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="white" opacity="0.8"/>
    </g>
  </g>

  <!-- Title -->
  <text x="300" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">Git Push Tracker</text>

  <!-- Subtitle -->
  <text x="300" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="#94a3b8">AI-powered push summaries for your team</text>

  <!-- Feature pills -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="100" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">GitHub + GitLab</text>

    <rect x="220" y="0" width="220" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="330" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Gemini AI Summaries</text>

    <rect x="460" y="0" width="200" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="560" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Per-Project APIs</text>

    <rect x="680" y="0" width="180" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="770" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">Self-Hosted</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#e6392b" opacity="0.8"/>
  <text x="600" y="621" font-family="-apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="500">github.com/molimat/git-push-tracker</text>
</svg>
